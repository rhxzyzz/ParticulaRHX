<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ParticulaRHX v2</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0a0a12;
    height: 100%;
  }
  canvas {
    display: block;
  }
  #hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-family: sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hint">clique para trocar de forma antes da hora</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function heartPoints(count, scale) {
  const boundary = [];
  const N = 240;
  for (let i = 0; i < N; i++) {
    const t = (i / N) * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
    boundary.push([x, y]);
  }

  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const [x, y] of boundary) {
    if (x < minX) minX = x;
    if (x > maxX) maxX = x;
    if (y < minY) minY = y;
    if (y > maxY) maxY = y;
  }

  function inside(px, py) {
    let c = false;
    for (let i = 0, j = boundary.length - 1; i < boundary.length; j = i++) {
      const xi = boundary[i][0], yi = boundary[i][1];
      const xj = boundary[j][0], yj = boundary[j][1];
      const intersect = ((yi > py) !== (yj > py)) &&
        (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
      if (intersect) c = !c;
    }
    return c;
  }

  const pts = [];
  let guard = 0;
  while (pts.length < count && guard < count * 300) {
    guard++;
    const x = minX + Math.random() * (maxX - minX);
    const y = minY + Math.random() * (maxY - minY);
    if (inside(x, y)) {
      pts.push({ x: x * scale, y: y * scale });
    }
  }
  return pts;
}

function xPoints(count, size) {
  const w = size * 0.24;
  const halfW = w / 2;
  const O = [0, 0];
  const L = [-size, -size];
  const R = [size, -size];
  const B = [0, size];

  function rectFor(A, C) {
    const dx = C[0] - A[0], dy = C[1] - A[1];
    const len = Math.sqrt(dx * dx + dy * dy);
    const ux = dx / len, uy = dy / len;
    const px = -uy * halfW, py = ux * halfW;
    return [
      [A[0] + px, A[1] + py],
      [C[0] + px, C[1] + py],
      [C[0] - px, C[1] - py],
      [A[0] - px, A[1] - py]
    ];
  }

  const armL = rectFor(O, L);
  const armR = rectFor(O, R);
  const stem = rectFor(O, B);

  function inPoly(px, py, poly) {
    let c = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const xi = poly[i][0], yi = poly[i][1];
      const xj = poly[j][0], yj = poly[j][1];
      const intersect = ((yi > py) !== (yj > py)) &&
        (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
      if (intersect) c = !c;
    }
    return c;
  }

  function inCircle(px, py, cx, cy, r) {
    const dx = px - cx, dy = py - cy;
    return dx * dx + dy * dy <= r * r;
  }

  const caps = [O, L, R, B];
  const capR = halfW;

  function insideY(px, py) {
    if (inPoly(px, py, armL)) return true;
    if (inPoly(px, py, armR)) return true;
    if (inPoly(px, py, stem)) return true;
    for (const c of caps) {
      if (inCircle(px, py, c[0], c[1], capR)) return true;
    }
    return false;
  }

  const minX = -size - w, maxX = size + w;
  const minY = -size - w, maxY = size + w;

  const pts = [];
  let guard = 0;
  while (pts.length < count && guard < count * 300) {
    guard++;
    const x = minX + Math.random() * (maxX - minX);
    const y = minY + Math.random() * (maxY - minY);
    if (insideY(x, y)) pts.push({ x, y });
  }
  return pts;
}

function heartOutlinePoints(count, scale) {
  const pts = [];
  for (let i = 0; i < count; i++) {
    const t = Math.random() * Math.PI * 2;
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
    const jitter = 0.92 + Math.random() * 0.16;
    pts.push({ x: x * scale * jitter, y: y * scale * jitter });
  }
  return pts;
}

const NUM_PARTICLES = 1100;
const scaleH = Math.min(W, H) / 34;
const Y_FRACTION = 0.68;
const yCount = Math.floor(NUM_PARTICLES * Y_FRACTION);
const ringCount = NUM_PARTICLES - yCount;
const sizeX = (Math.min(W, H) / 3.4) * 0.62;

let heartTargets = heartPoints(NUM_PARTICLES, scaleH);
let xTargets = xPoints(yCount, sizeX).concat(heartOutlinePoints(ringCount, scaleH));

const particles = [];
for (let i = 0; i < NUM_PARTICLES; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: 0,
    vy: 0,
    hue: 340 + Math.random() * 40,
    hueX: 190 + Math.random() * 60,
    baseSize: Math.random() * 2 + 1,
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.02 + Math.random() * 0.03,
    wobbleAmp: 2 + Math.random() * 3.5,
    twinklePhase: Math.random() * Math.PI * 2,
    twinkleSpeed: 0.03 + Math.random() * 0.05
  });
}

let shape = 'heart';
let lastSwitch = performance.now();
const HOLD_TIME = 3200;

function currentTargets() {
  return shape === 'heart' ? heartTargets : xTargets;
}

function switchShape() {
  shape = shape === 'heart' ? 'x' : 'heart';
  lastSwitch = performance.now();
}

canvas.addEventListener('click', switchShape);

function animate(now) {
  ctx.fillStyle = 'rgba(10, 10, 18, 0.16)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2;
  const targets = currentTargets();
  const elapsed = now - lastSwitch;
  const settleProgress = Math.min(elapsed / 900, 1);

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const t = targets[i];

    p.wobblePhase += p.wobbleSpeed;
    const wobbleX = Math.cos(p.wobblePhase) * p.wobbleAmp * settleProgress;
    const wobbleY = Math.sin(p.wobblePhase * 1.3) * p.wobbleAmp * settleProgress;

    const tx = cx + t.x + wobbleX;
    const ty = cy + t.y + wobbleY;

    const dx = tx - p.x;
    const dy = ty - p.y;

    p.vx += dx * 0.03;
    p.vy += dy * 0.03;
    p.vx *= 0.82;
    p.vy *= 0.82;

    p.x += p.vx;
    p.y += p.vy;

    p.twinklePhase += p.twinkleSpeed;
    const pulse = 1 + Math.sin(p.twinklePhase) * 0.4;
    const twinkleAlpha = 0.55 + Math.sin(p.twinklePhase * 0.7) * 0.35;
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const size = p.baseSize * pulse + Math.min(speed * 0.08, 1.5);
    const hue = shape === 'heart' ? p.hue : (i < yCount ? p.hueX : p.hue);

    ctx.beginPath();
    ctx.fillStyle = `hsla(${hue}, 95%, 68%, ${twinkleAlpha})`;
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fill();
  }

  if (now - lastSwitch > HOLD_TIME) {
    switchShape();
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
